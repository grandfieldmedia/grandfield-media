<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Grandfield Media — Grid logo (original, vector master) -->
  <rect width="1024" height="1024" rx="224" fill="#16191E"/>
  <!--
    3x3 grid, cell 155, gap 58, grid width = 3*155 + 2*58 = 581, origin = (1024-581)/2 = 221.5 ≈ 221
    Gold squares on the anti-diagonal: top-right, center, bottom-left
  -->
  <g fill="#F2EFE6">
    <rect x="221" y="221" width="155" height="155" rx="38"/>
    <rect x="434" y="221" width="155" height="155" rx="38"/>
    <rect x="221" y="434" width="155" height="155" rx="38"/>
    <rect x="647" y="434" width="155" height="155" rx="38"/>
    <rect x="434" y="647" width="155" height="155" rx="38"/>
    <rect x="647" y="647" width="155" height="155" rx="38"/>
  </g>
  <g fill="#C79A2B">
    <rect x="647" y="221" width="155" height="155" rx="38"/>
    <rect x="434" y="434" width="155" height="155" rx="38"/>
    <rect x="221" y="647" width="155" height="155" rx="38"/>
  </g>
</svg>
